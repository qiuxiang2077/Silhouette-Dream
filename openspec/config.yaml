schema: spec-driven

# Project context - shown to AI when creating artifacts
context: |
  ## 项目：《影梦》(Silhouette Dream)
  
  **游戏类型**：伪3D俯视角像素风格叙事冒险游戏
  **引擎**：Godot 4.x
  **世界观**：「梵天一梦」式梦境逻辑，融合现实成长叙事与共生设定
  
  **核心概念**：
  - 双重世界（梦境冒险+现实成长）
  - 影子共生种族（依附/游离/消逝三态）
  - 情绪投射怪物系统（恐惧→怪物、孤独→迷宫）
  - 睡眠阶段系统（清醒期→浅睡期→深睡期→REM期）
  
  **美术风格**：千禧年梦核风
  - 改革开放后中国快速城市化时期的后现代主义建筑
  - 蓝色/绿色玻璃、白色瓷砖贴片外立面
  - 人去楼空、破旧不堪、童年回忆物品
  - 核心氛围："你可以回到这里，但这里已经没有人了"
  
  **参考游戏**：《元气骑士》《饥荒》《Hades》《Hollow Knight》《Gris》
  
  **当前状态**：
  - 设定文档已完成
  - 核心玩法机制待确定（最大阻塞点）
  - 第二阶段Agent协调已规划
  - godot-mcp AI编程助手已集成（149个工具）
  
  **AI Agent分工**：
  - Agent A：程序编程需求分析师
  - Agent B：插件脚本开发工程师（使用godot-mcp）
  - Agent C：美术音频设计师

# Per-artifact rules
rules:
  proposal:
    - 必须明确变更目标和预期成果
    - 包含与现有设定文档的关联说明
    - 标注阻塞点和依赖关系
  
  design:
    - 技术设计必须考虑Godot 4.x特性
    - 区分梦境世界和现实世界的实现差异
    - 包含与影子共生系统的一致性检查
  
  tasks:
    - 每个任务不超过4小时工作量
    - 明确标注负责Agent（A/B/C）
    - 包含与现有项目管理文档的同步要求
